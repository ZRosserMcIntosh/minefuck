name: Build and Release MineFuck

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build JAR and EXE
        run: mvn clean package -Pwindows-exe -q
        shell: cmd

      - name: Verify outputs
        run: |
          dir target\minefuck-1.0-SNAPSHOT.jar
          dir target\MineFuck.exe
        shell: cmd

      - name: Prepare release files
        run: |
          mkdir release
          copy target\MineFuck.exe release\
          copy target\minefuck-1.0-SNAPSHOT.jar release\MineFuck.jar
          copy run.sh release\
          copy run.bat release\
          copy MineFuck-Mac.command release\
        shell: cmd

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: minefuck-release
          path: release/

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: minefuck-release
          path: release

      - name: Create zip packages
        run: |
          cd release
          chmod +x run.sh MineFuck-Mac.command 2>/dev/null || true
          zip -r ../MineFuck-Windows.zip MineFuck.exe MineFuck.jar run.bat
          zip -r ../MineFuck-macOS.zip MineFuck.jar run.sh MineFuck-Mac.command
          zip -r ../MineFuck-Universal.zip MineFuck.exe MineFuck.jar run.sh run.bat MineFuck-Mac.command
          cd ..
          cp release/MineFuck.exe .
          cp release/MineFuck.jar .
          echo "=== Release files ==="
          ls -lh MineFuck.exe MineFuck.jar MineFuck-Windows.zip MineFuck-macOS.zip MineFuck-Universal.zip

      - name: Delete old release
        continue-on-error: true
        run: gh release delete latest --yes --cleanup-tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "MineFuck v1.0.0 - Download and Play"
          body: |
            ## 🎮 Download MineFuck
            Version: 1.0.0

            **Includes auto-updating!** The game checks for new versions on startup.

            ### 🪟 Windows — Just double-click!
            1. Download **MineFuck.exe** below
            2. Double-click it. Done!
            3. Requires Java 17+ (opens download page if missing)
            4. Windows SmartScreen may warn → click **More info** → **Run anyway**

            ### 🍎 macOS
            1. Download **MineFuck-macOS.zip**
            2. Extract and double-click **MineFuck-Mac.command**
            3. If blocked: Right-click → Open → Open

            ### 🐧 Linux
            1. Download **MineFuck-Universal.zip**
            2. `chmod +x run.sh && ./run.sh`
          draft: false
          prerelease: false
          make_latest: true
          files: |
            MineFuck.exe
            MineFuck.jar
            MineFuck-Windows.zip
            MineFuck-macOS.zip
            MineFuck-Universal.zip
