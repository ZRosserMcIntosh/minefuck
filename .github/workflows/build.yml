name: Build and Release MineFuck

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build fat JAR
        run: mvn clean package -q

      - name: Verify natives are bundled
        run: |
          echo "=== JAR size ==="
          ls -lh target/minefuck-1.0-SNAPSHOT.jar
          echo "=== Bundled natives ==="
          jar tf target/minefuck-1.0-SNAPSHOT.jar | grep -E '\.(dll|dylib|so)$'

      - name: Download Launch4j
        run: |
          wget -q "https://sourceforge.net/projects/launch4j/files/launch4j-3/3.50/launch4j-3.50-linux-x64.tgz/download" -O launch4j.tgz
          tar xzf launch4j.tgz

      - name: Build Windows exe
        run: |
          JAR_PATH="$(pwd)/target/minefuck-1.0-SNAPSHOT.jar"
          EXE_PATH="$(pwd)/MineFuck.exe"
          sed -e "s|PLACEHOLDER_JAR|${JAR_PATH}|g" -e "s|PLACEHOLDER_EXE|${EXE_PATH}|g" launch4j-config.xml > launch4j-resolved.xml
          ./launch4j/launch4j launch4j-resolved.xml
          ls -lh MineFuck.exe

      - name: Prepare release artifacts
        run: |
          mkdir -p release
          cp target/minefuck-1.0-SNAPSHOT.jar release/MineFuck.jar
          cp MineFuck.exe release/
          cp run.sh release/
          cp run.bat release/
          cp MineFuck-Mac.command release/
          chmod +x release/run.sh release/MineFuck-Mac.command
          cd release
          zip -r ../MineFuck-Windows.zip MineFuck.exe MineFuck.jar run.bat
          zip -r ../MineFuck-macOS.zip MineFuck.jar run.sh MineFuck-Mac.command
          zip -r ../MineFuck-Universal.zip MineFuck.exe MineFuck.jar run.sh run.bat MineFuck-Mac.command
          cd ..
          ls -lh MineFuck-Windows.zip MineFuck-macOS.zip MineFuck-Universal.zip

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: MineFuck
          path: |
            release/MineFuck.exe
            release/MineFuck.jar

      - name: Delete old release
        continue-on-error: true
        run: gh release delete latest --yes --cleanup-tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: MineFuck - Download and Play
          body: |
            ## Download MineFuck

            ### Windows
            Download MineFuck.exe and double-click it.
            If Java is missing it opens the download page automatically.
            Windows SmartScreen may warn - click More info then Run anyway.

            ### macOS
            Download MineFuck-macOS.zip, extract, double-click MineFuck-Mac.command

            ### Linux
            Download MineFuck-macOS.zip, extract, run ./run.sh
          draft: false
          prerelease: false
          make_latest: true
          files: |
            MineFuck.exe
            MineFuck-Windows.zip
            MineFuck-macOS.zip
            MineFuck-Universal.zip
            release/MineFuck.jar
